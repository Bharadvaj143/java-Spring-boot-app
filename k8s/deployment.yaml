apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-deployment
  labels:
    app: spring-boot-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: spring-boot-app
  template:
    metadata:
      labels:
        app: spring-boot-app
    spec:
      containers:
      - name: spring-boot-app
        labels:
          app: spring-boot-app
        image: bharadvajnanepalli/cicd-spring-boot-app:9
        ports:
        - containerPort: 8080